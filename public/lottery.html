<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抽奖活动</title>
  <style>
    :root {
      --bg1: #eaf0fb;
      --bg2: #d9e4f8;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(148, 163, 184, 0.2);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-2: #3b82f6;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 24px 62px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.2), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(125, 211, 252, 0.18), transparent 30%),
        linear-gradient(170deg, var(--bg1), var(--bg2));
      padding: 22px;
    }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .btn {
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      border-radius: 999px;
      min-height: 40px;
      min-width: 110px;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 220ms cubic-bezier(0.2, 0.75, 0.25, 1), box-shadow 260ms ease, filter 220ms ease, border-color 220ms ease, background 260ms ease;
      animation: button-breathe 2.2s ease-in-out infinite;
    }

    @keyframes button-breathe {
      0% {
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.14);
        filter: brightness(1);
      }
      50% {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 16px 30px rgba(37, 99, 235, 0.28);
        filter: brightness(1.08);
      }
      100% {
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.14);
        filter: brightness(1);
      }
    }

    @keyframes button-click-pop {
      0% { transform: translateY(0) scale(1); }
      40% { transform: translateY(1px) scale(0.95); }
      100% { transform: translateY(0) scale(1); }
    }

    .btn:active {
      animation: button-click-pop 220ms ease-out;
    }

    .btn.primary {
      color: #fff;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.26);
    }

    .btn.warn {
      color: #fff;
      border: none;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      box-shadow: 0 14px 30px rgba(234, 88, 12, 0.26);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .card {
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      line-height: 1.05;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(255, 255, 255, 0.84);
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .stat span { color: var(--muted); font-size: 0.86rem; }
    .stat strong { font-size: 1.8rem; line-height: 1; }

    .draw-box {
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.1), rgba(59, 130, 246, 0.08));
      display: grid;
      gap: 10px;
    }

    .draw-status {
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #334155;
      line-height: 1.6;
      min-height: 54px;
    }

    .draw-status.error {
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.2);
      background: rgba(254, 242, 242, 0.92);
    }

    .draw-status.success {
      color: var(--success);
      border-color: rgba(22, 163, 74, 0.2);
      background: rgba(240, 253, 244, 0.92);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.84);
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .item strong { font-size: 0.98rem; }
    .item span { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <a class="btn" href="/store.html">返回商店</a>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
        <a class="btn warn" href="/store-admin.html" data-dev-edit-products hidden>开发者修改商品</a>
        <a class="btn" href="/login.html">登录账号</a>
      </div>
    </header>

    <section class="grid">
      <article class="card">
        <h1 class="title">抽奖活动</h1>
        <p class="desc">每次抽奖消耗一次抽奖机会。奖品会从奖池中随机抽取并扣减库存，中奖记录只显示当前账号。</p>

        <div class="stats">
          <div class="stat"><span>抽奖价格</span><strong data-price>¥50.00</strong></div>
          <div class="stat"><span>可抽奖品</span><strong data-prize-count>0</strong></div>
          <div class="stat"><span>剩余次数</span><strong data-remaining>0</strong></div>
        </div>
      </article>

      <article class="card">
        <div class="draw-box">
          <button class="btn primary" type="button" data-draw-btn>开始抽奖</button>
          <div class="draw-status" data-draw-status>登录后可进行抽奖。</div>
          <div class="desc">未登录状态下可浏览奖池，抽奖前请先登录社区账号。</div>
        </div>
      </article>
    </section>

    <section class="grid">
      <article class="card">
        <h3>奖池商品</h3>
        <div class="list" data-prize-list></div>
      </article>

      <article class="card">
        <h3>我的抽奖记录</h3>
        <div class="list" data-record-list></div>
      </article>
    </section>
  </main>

  <script>
    (function () {
      const priceEl = document.querySelector('[data-price]');
      const prizeCountEl = document.querySelector('[data-prize-count]');
      const remainingEl = document.querySelector('[data-remaining]');
      const drawButton = document.querySelector('[data-draw-btn]');
      const drawStatus = document.querySelector('[data-draw-status]');
      const prizeList = document.querySelector('[data-prize-list]');
      const recordList = document.querySelector('[data-record-list]');
      const developerEditProductsLink = document.querySelector('[data-dev-edit-products]');
      let lotteryEnabled = true;
      let lotteryClosedMessage = '';

      function setStatus(text, kind) {
        if (!drawStatus) return;
        drawStatus.textContent = text;
        drawStatus.classList.remove('error', 'success');
        if (kind) drawStatus.classList.add(kind);
      }

      function formatPriceFen(fen) {
        const amount = Number(fen || 0) / 100;
        return new Intl.NumberFormat('zh-CN', { style: 'currency', currency: 'CNY' }).format(amount);
      }

      function getAuthHeaders() {
        const token = String(localStorage.getItem('mctools-auth-token') || '').trim();
        const headers = {};
        if (token) headers.Authorization = `Bearer ${token}`;
        return headers;
      }

      function renderPrizes(prizes) {
        if (!prizeList) return;
        if (!Array.isArray(prizes) || prizes.length === 0) {
          prizeList.innerHTML = '<div class="item"><span>当前暂无奖品。</span></div>';
          return;
        }

        prizeList.innerHTML = prizes.map((item) => `
          <div class="item">
            <strong>${String(item.name || '')}</strong>
            <span>${String(item.description || '')}</span>
            <span>库存：${Number(item.stock || 0)}</span>
          </div>
        `).join('');
      }

      function renderRecords(records, loggedIn) {
        if (!recordList) return;
        if (!loggedIn) {
          recordList.innerHTML = '<div class="item"><span>登录后可以查看抽奖记录。</span></div>';
          return;
        }
        if (!Array.isArray(records) || records.length === 0) {
          recordList.innerHTML = '<div class="item"><span>暂无抽奖记录。</span></div>';
          return;
        }

        recordList.innerHTML = records.map((row) => `
          <div class="item">
            <strong>${String(row.prizeName || '--')}</strong>
            <span>时间：${String(row.createdAt || '--')}</span>
            <span>花费：${formatPriceFen(row.priceFen || 0)}</span>
          </div>
        `).join('');
      }

      async function loadConfig() {
        const response = await fetch('/api/lottery/config');
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || '读取抽奖配置失败');
        }

        lotteryEnabled = result?.enabled !== false;
        lotteryClosedMessage = String(result?.message || '').trim();

        if (priceEl) priceEl.textContent = formatPriceFen(result.priceFen || 0);
        if (prizeCountEl) prizeCountEl.textContent = String(result.prizeCount || 0);
        renderPrizes(result.prizes || []);

        if (drawButton && !lotteryEnabled) {
          drawButton.disabled = true;
          setStatus(lotteryClosedMessage || '抽奖活动暂时关闭', 'error');
        }
      }

      async function loadRecords() {
        const response = await fetch('/api/lottery/records', {
          headers: getAuthHeaders()
        });
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || '读取抽奖记录失败');
        }

        const loggedIn = Boolean(result.loggedIn);
        const enabled = result?.enabled !== false;
        const disabledMessage = String(result?.message || '').trim();
        lotteryEnabled = enabled;
        if (disabledMessage) {
          lotteryClosedMessage = disabledMessage;
        }
        if (remainingEl) remainingEl.textContent = String(result.remainingTodayDraws ?? 0);
        if (drawButton) drawButton.disabled = !loggedIn || !lotteryEnabled || Number(result.remainingTodayDraws || 0) <= 0;
        renderRecords(result.records || [], loggedIn);

        if (!lotteryEnabled) {
          setStatus(lotteryClosedMessage || '抽奖活动暂时关闭', 'error');
        } else if (!loggedIn) {
          setStatus('登录后可进行抽奖。');
        }
      }

      async function updateDeveloperAction() {
        if (!developerEditProductsLink) {
          return;
        }

        try {
          const response = await fetch('/api/community/me', {
            headers: getAuthHeaders()
          });
          if (!response.ok) {
            developerEditProductsLink.hidden = true;
            return;
          }

          const result = await response.json();
          const canEditStore = Boolean(result?.loggedIn && (result?.canEditStore || result?.isDeveloper));
          developerEditProductsLink.hidden = !canEditStore;
        } catch {
          developerEditProductsLink.hidden = true;
        }
      }

      async function drawOnce() {
        if (!drawButton) {
          return;
        }

        if (!lotteryEnabled) {
          setStatus(lotteryClosedMessage || '抽奖活动暂时关闭', 'error');
          drawButton.disabled = true;
          return;
        }

        drawButton.disabled = true;
        setStatus('正在抽奖，请稍候...');

        try {
          const response = await fetch('/api/lottery/draw', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json; charset=utf-8',
              ...getAuthHeaders()
            },
            body: JSON.stringify({})
          });
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.message || '抽奖失败');
          }

          const prizeName = String(result?.prize?.name || '未知奖品');
          setStatus(`恭喜你抽中：${prizeName}`, 'success');
          await loadConfig();
          await loadRecords();
        } catch (error) {
          setStatus(error.message || '抽奖失败', 'error');
          await loadRecords();
        }
      }

      if (drawButton) {
        drawButton.addEventListener('click', drawOnce);
      }

      Promise.resolve()
        .then(loadConfig)
        .then(loadRecords)
        .then(updateDeveloperAction)
        .catch((error) => {
          setStatus(error.message || '初始化失败', 'error');
        });
    })();
  </script>
</body>
</html>
