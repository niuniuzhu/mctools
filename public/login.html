<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录入口</title>
    <script>
      document.documentElement.dataset.ui = 'normal';
    </script>
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="badge">MCTools</p>
        <h1>登录入口</h1>
        <p class="lead">登录后可同步账号状态、收藏与工具箱记录。</p>

        <div class="tab-row" role="tablist" aria-label="登录注册切换">
          <button class="tab-btn active" type="button" data-tab="login">登录</button>
          <button class="tab-btn" type="button" data-tab="register">注册</button>
        </div>

        <section class="tab-status" data-tab-status>
          <span class="tab-status-tag" data-tab-status-tag>当前模式</span>
          <strong class="tab-status-title" data-tab-status-title>登录工具箱</strong>
          <p class="tab-status-note" data-tab-status-note>输入账号和密码后直接进入首页。</p>
        </section>

        <section class="tab-status" aria-label="功能分区提示">
          <span class="tab-status-tag">功能分区</span>
          <strong class="tab-status-title">账号、扫码、快捷入口</strong>
          <p class="tab-status-note">上方用于账号登录/注册，中部支持扫码，下方保留快速跳转入口。</p>
        </section>

        <form class="auth-form" data-form="login">
          <label class="field-label" for="login-username">用户名</label>
          <input id="login-username" class="auth-input" name="username" type="text" autocomplete="username" required />

          <label class="field-label" for="login-password">密码</label>
          <input id="login-password" class="auth-input" name="password" type="password" autocomplete="current-password" required />

          <button class="submit-btn" type="submit">登录并进入工具箱</button>
        </form>

        <form class="auth-form hidden" data-form="register">
          <label class="field-label" for="register-username">用户名</label>
          <input id="register-username" class="auth-input" name="username" type="text" autocomplete="username" required />

          <label class="field-label" for="register-password">密码</label>
          <input id="register-password" class="auth-input" name="password" type="password" autocomplete="new-password" required />

          <input name="registerAsDeveloper" data-developer-flag type="hidden" value="0" />
          <section class="developer-register hidden" data-developer-register>
            <label class="field-label" for="developer-secret">开发者授权码</label>
            <input id="developer-secret" class="auth-input" name="developerSecret" data-developer-secret type="text" autocomplete="one-time-code" />
            <button class="ghost-btn" type="button" data-developer-exit>退出开发者模式</button>
          </section>

          <button class="submit-btn" type="submit">注册并进入工具箱</button>
        </form>

        <p class="message" data-message></p>

        <section class="qr-login">
          <div class="qr-head">
            <strong>扫码登录</strong>
            <button class="ghost-btn" type="button" data-qr-refresh>刷新二维码</button>
          </div>
          <div class="qr-preview" data-qr-preview>
            <div class="qr-placeholder" data-qr-placeholder>正在生成二维码...</div>
          </div>
          <p class="qr-status" data-qr-status>等待扫码</p>
          <p class="qr-expire" data-qr-expire>有效期：--</p>
          <div class="qr-actions">
            <a class="ghost-btn" data-qr-open href="/scan-login.html" target="_blank" rel="noreferrer">打开确认页</a>
            <button class="ghost-btn" type="button" data-qr-copy-link>复制确认链接</button>
          </div>
          <p class="qr-link" data-qr-link-text>确认链接：--</p>
        </section>

        <div class="auth-loading" data-auth-loading hidden>
          <div class="auth-loading-inner">
            <p data-auth-loading-message>正在进入首页...</p>
            <div class="auth-loading-track">
              <div class="auth-loading-progress" data-auth-loading-progress></div>
            </div>
          </div>
        </div>

        <div class="actions-row">
          <a class="ghost-link" href="/index.html">返回首页</a>
          <a class="ghost-link" href="/store.html">进入商店</a>
          <a class="ghost-link" href="/niuniu-toolbox.html">直接进入工具箱</a>
        </div>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
