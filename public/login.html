<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界工具箱 - 登录</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'normal';
        const nextUi = storedUi === 'normal' || storedUi === 'classic' || storedUi === 'end' ? storedUi : 'normal';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'normal';
      }
    </script>
    <link rel="stylesheet" href="/login.css" />
    <script defer src="/login.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <p class="badge">Minecraft Toolbox</p>
        <h1 data-maintenance-title>我的世界工具箱</h1>
        <p class="lead">先登录或注册，再进入工具箱。当前提供 7 个分类入口，现阶段开放指令、教程、帧率测试、页面检测、配方、坐标与自动化入口。</p>
        <div class="version-pill">当前版本 beta1.5.1</div>
        <section class="maintenance-unlock hidden" data-maintenance-unlock>
          <p class="maintenance-unlock-label">入口已解锁</p>
          <div class="special-entry-row">
            <button type="button" class="ghost-button" data-maintenance-entry>维护账号注册</button>
            <button type="button" class="ghost-button" data-developer-entry>开发者账号注册</button>
          </div>
        </section>
        <p class="maintenance-banner" data-maintenance-banner hidden></p>

        <section class="ui-picker" aria-label="界面风格选择">
          <p class="ui-picker-label">界面风格</p>
          <div class="ui-choice-row">
            <button class="ui-choice" type="button" data-ui-choice="normal">现代 UI</button>
            <button class="ui-choice" type="button" data-ui-choice="end">末地 UI</button>
            <button class="ui-choice" type="button" data-ui-choice="ore" disabled title="暂时停用">基岩ORE UI</button>
            <button class="ui-choice" type="button" data-ui-choice="classic">经典 UI</button>
          </div>
        </section>

        <div class="auth-tabs" role="tablist" aria-label="登录注册切换">
          <button class="tab-button active" type="button" data-tab="login">登录</button>
          <button class="tab-button" type="button" data-tab="register">注册</button>
        </div>

        <form class="auth-form" data-form="login">
          <label>
            用户名
            <input type="text" name="username" autocomplete="username" required minlength="3" maxlength="32" />
          </label>
          <label>
            密码
            <input type="password" name="password" autocomplete="current-password" required minlength="6" />
          </label>
          <section class="captcha-block" aria-label="登录验证码">
            <div class="captcha-head">
              <p class="captcha-label">验证码登录</p>
              <button type="button" class="text-button" data-captcha-refresh>刷新验证码</button>
            </div>
            <div class="captcha-row">
              <div class="captcha-preview" data-captcha-preview>正在加载验证码...</div>
              <label class="captcha-input-label">
                输入验证码
                <input type="text" name="captchaCode" autocomplete="off" inputmode="latin" maxlength="4" required data-captcha-input />
              </label>
            </div>
            <input type="hidden" name="captchaId" data-captcha-id />
          </section>
          <button type="submit" class="primary-button">登录</button>
        </form>

        <form class="auth-form hidden" data-form="register">
          <label>
            用户名
            <input type="text" name="username" autocomplete="username" required minlength="3" maxlength="32" />
          </label>
          <label>
            密码
            <input type="password" name="password" autocomplete="new-password" required minlength="6" />
          </label>
          <section class="maintenance-register hidden" data-maintenance-register>
            <div class="maintenance-register-head">
              <p class="maintenance-register-title">维护账号注册模式</p>
              <button type="button" class="text-button" data-maintenance-exit>退出</button>
            </div>
            <p class="maintenance-register-note">创建后可登录并控制维护状态。</p>
            <input type="hidden" name="registerAsMaintenanceAdmin" value="0" data-maintenance-flag />
            <label>
              维护授权码
              <input type="password" name="maintenanceSecret" autocomplete="off" data-maintenance-secret />
            </label>
          </section>
          <section class="maintenance-register hidden" data-developer-register>
            <div class="maintenance-register-head">
              <p class="maintenance-register-title">开发者账号注册模式</p>
              <button type="button" class="text-button" data-developer-exit>退出</button>
            </div>
            <p class="maintenance-register-note">可进入开发者控制台，查看并修改项目代码文件。</p>
            <input type="hidden" name="registerAsDeveloper" value="0" data-developer-flag />
            <label>
              开发者授权码
              <input type="password" name="developerSecret" autocomplete="off" data-developer-secret />
            </label>
          </section>
          <button type="submit" class="primary-button">注册并进入</button>
        </form>

        <p class="message" data-message></p>
      </section>
    </main>
  </body>
</html>
