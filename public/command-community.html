<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>指令社区 · MCTools</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'milktea';
        const nextUi = storedUi === 'normal' || storedUi === 'classic' || storedUi === 'end' ? storedUi : 'normal';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'normal';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        background:
          radial-gradient(circle at 18% 6%, rgba(96, 165, 250, 0.06), transparent 22%),
          radial-gradient(circle at 82% 14%, rgba(148, 163, 184, 0.04), transparent 20%),
          linear-gradient(160deg, #040910, #091420 52%, #06101a);
      }

      .community-shell {
        width: min(1240px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      .community-hero,
      .community-panel,
      .community-review {
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #0f1a2a;
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.3);
        border-radius: 24px;
      }

      .community-hero {
        padding: 28px;
        margin-bottom: 18px;
        display: grid;
        gap: 14px;
      }

      .community-topline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .community-kicker {
        margin: 0;
        color: #fbbf24;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .community-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 18px;
        align-items: start;
      }

      .community-panel,
      .community-review {
        padding: 22px;
      }

      .community-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #0d1724;
        color: #cfe3fb;
        font-size: 0.88rem;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 0.88rem;
        font-weight: 700;
        color: #d7e3f4;
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #060d16;
        color: #f8fafc;
        padding: 12px 14px;
        font: inherit;
      }

      .input::placeholder,
      .textarea::placeholder {
        color: #7f92ab;
      }

      .input:focus,
      .textarea:focus,
      .select:focus {
        outline: none;
        border-color: rgba(96, 165, 250, 0.5);
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.14);
      }

      .textarea {
        min-height: 120px;
        resize: vertical;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .submit-btn,
      .review-btn {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .submit-btn {
        background: #60a5fa;
        color: #08111f;
      }

      .review-btn.approve {
        background: #22c55e;
        color: #06101d;
      }

      .review-btn.reject {
        background: #dc2626;
        color: #fff;
      }

      .status {
        min-height: 22px;
        color: #93c5fd;
        font-weight: 600;
      }

      .status.error {
        color: #fda4af;
      }

      .entry-list {
        display: grid;
        gap: 12px;
      }

      .entry {
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #0f1a2a;
        border-radius: 18px;
        padding: 16px;
      }

      .entry-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .entry-meta {
        color: #8ca0ba;
        font-size: 0.86rem;
      }

      .command-text {
        margin: 10px 0;
        padding: 12px;
        border-radius: 14px;
        background: #050b13;
        border: 1px solid rgba(148, 163, 184, 0.14);
        font-family: Consolas, Monaco, monospace;
        word-break: break-word;
      }

      .review-list {
        display: grid;
        gap: 10px;
      }

      .review-form {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      h1,
      h2 {
        letter-spacing: -0.02em;
      }

      .lead {
        color: #b7c8df;
      }

      .community-topline,
      .community-head {
        align-items: flex-start;
      }

      .button-row > a,
      .button-row > button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #0d1724;
        color: #d7e7fb;
        text-decoration: none;
        font: inherit;
        font-weight: 700;
      }

      .button-row > a:hover,
      .button-row > button:hover {
        border-color: rgba(96, 165, 250, 0.42);
        background: #132235;
      }

      .submit-btn,
      .review-btn.approve,
      .review-btn.reject {
        min-width: 92px;
      }

      .submit-btn {
        border: 1px solid rgba(96, 165, 250, 0.28);
        box-shadow: 0 10px 22px rgba(96, 165, 250, 0.18);
      }

      .review-btn.approve {
        border: 1px solid rgba(34, 197, 94, 0.28);
      }

      .review-btn.reject {
        border: 1px solid rgba(220, 38, 38, 0.28);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 960px) {
        .community-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="community-shell">
      <section class="community-hero">
        <div class="community-topline">
          <div>
            <p class="community-kicker">Command Community</p>
            <h1>指令社区</h1>
            <p class="lead">玩家可以自由投稿指令，后台审核通过后会公开展示，方便大家直接复制和交流。</p>
          </div>
          <div class="pill">3003 端口 · 投稿后等待审核</div>
        </div>
        <div class="button-row">
          <a class="ghost-link-button" href="/index.html">返回选择界面</a>
          <a class="ghost-link-button" href="/commands.html">打开指令工作台</a>
        </div>
      </section>

      <section class="community-grid">
        <section class="community-panel">
          <div class="community-head">
            <div>
              <p class="panel-label">玩家投稿</p>
              <h2>提交你的指令</h2>
            </div>
            <span class="pill">支持自定义分类</span>
          </div>
          <div class="form-grid">
            <label class="field">
              <span>投稿昵称</span>
              <input class="input" data-submit-name placeholder="例如：建筑党小明" />
            </label>
            <label class="field">
              <span>分类</span>
              <select class="select" data-submit-category>
                <option>通用</option>
                <option>建筑</option>
                <option>冒险</option>
                <option>红石</option>
                <option>生存</option>
                <option>娱乐</option>
                <option>其他</option>
              </select>
            </label>
            <label class="field">
              <span>指令内容</span>
              <textarea class="textarea" data-submit-command placeholder="例如：tp @p 100 80 100"></textarea>
            </label>
            <label class="field">
              <span>说明</span>
              <textarea class="textarea" data-submit-description placeholder="这条指令适合什么场景、怎么用"></textarea>
            </label>
            <div class="button-row">
              <button type="button" class="submit-btn" data-submit>提交审核</button>
              <button type="button" class="ghost-link-button" data-refresh>刷新列表</button>
            </div>
            <div class="status" data-submit-status>等待提交</div>
          </div>
        </section>

        <aside class="community-review hidden" data-review-panel>
          <div class="community-head">
            <div>
              <p class="panel-label">后台审核</p>
              <h2>待审投稿</h2>
            </div>
            <span class="pill">仅开发者可见</span>
          </div>
          <div class="review-form">
            <div class="button-row">
              <button type="button" class="ghost-link-button" data-load-pending>载入待审</button>
              <button type="button" class="ghost-link-button" data-load-all>查看全部</button>
            </div>
            <div class="review-list" data-review-list>
              <p class="entry-meta">尚未加载待审内容</p>
            </div>
          </div>
        </aside>

        <section class="community-panel" style="grid-column: 1 / -1;">
          <div class="community-head">
            <div>
              <p class="panel-label">公开展示</p>
              <h2>已通过审核的指令</h2>
            </div>
            <span class="pill">复制即用</span>
          </div>
          <div class="entry-list" data-approved-list>
            <p class="entry-meta">正在加载公开指令...</p>
          </div>
        </section>
      </section>
    </main>

    <script>
      const submitName = document.querySelector('[data-submit-name]');
      const submitCategory = document.querySelector('[data-submit-category]');
      const submitCommand = document.querySelector('[data-submit-command]');
      const submitDescription = document.querySelector('[data-submit-description]');
      const submitStatus = document.querySelector('[data-submit-status]');
      const approvedList = document.querySelector('[data-approved-list]');
      const reviewPanel = document.querySelector('[data-review-panel]');
      const reviewList = document.querySelector('[data-review-list]');

      let isDeveloper = false;

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          ...options
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || `请求失败（${response.status}）`);
        }
        return data;
      }

      function renderApproved(items) {
        if (!items.length) {
          approvedList.innerHTML = '<p class="entry-meta">暂无已通过的指令。</p>';
          return;
        }

        approvedList.innerHTML = items.map((item) => `
          <article class="entry">
            <div class="entry-top">
              <strong>${escapeHtml(item.submitterName)}</strong>
              <span class="entry-meta">${escapeHtml(item.category)} · ${escapeHtml(new Date(item.createdAt).toLocaleString('zh-CN'))}</span>
            </div>
            <div class="command-text">${escapeHtml(item.commandText)}</div>
            <p class="entry-meta">${escapeHtml(item.description || '无说明')}</p>
          </article>
        `).join('');
      }

      function renderReview(items) {
        if (!items.length) {
          reviewList.innerHTML = '<p class="entry-meta">没有待审指令。</p>';
          return;
        }

        reviewList.innerHTML = items.map((item) => `
          <article class="entry">
            <div class="entry-top">
              <strong>#${item.id} · ${escapeHtml(item.submitterName)}</strong>
              <span class="entry-meta">${escapeHtml(item.status)} · ${escapeHtml(item.category)}</span>
            </div>
            <div class="command-text">${escapeHtml(item.commandText)}</div>
            <p class="entry-meta">${escapeHtml(item.description || '无说明')}</p>
            <div class="button-row" style="margin-top: 10px;">
              <button class="review-btn approve" data-approve="${item.id}">通过</button>
              <button class="review-btn reject" data-reject="${item.id}">拒绝</button>
            </div>
          </article>
        `).join('');
      }

      async function loadApproved() {
        const data = await fetchJson('/api/command-community?status=APPROVED&limit=50');
        renderApproved(data.items || []);
      }

      async function loadReviewList(status = 'PENDING') {
        const data = await fetchJson(`/api/command-community/review?status=${encodeURIComponent(status)}&limit=50`);
        renderReview(data.items || []);
      }

      async function checkDeveloper() {
        try {
          const data = await fetchJson('/api/me');
          isDeveloper = Boolean(data.isDeveloper);
          reviewPanel.classList.toggle('hidden', !isDeveloper);
          if (isDeveloper) {
            await loadReviewList('PENDING');
          }
        } catch {
          reviewPanel.classList.add('hidden');
        }
      }

      document.querySelector('[data-submit]').addEventListener('click', async () => {
        submitStatus.textContent = '正在提交...';
        submitStatus.classList.remove('error');
        try {
          const data = await fetchJson('/api/command-community/submit', {
            method: 'POST',
            body: JSON.stringify({
              submitterName: submitName.value,
              category: submitCategory.value,
              commandText: submitCommand.value,
              description: submitDescription.value
            })
          });
          submitStatus.textContent = data.message;
          submitCommand.value = '';
          submitDescription.value = '';
          await loadApproved();
        } catch (error) {
          submitStatus.textContent = error.message;
          submitStatus.classList.add('error');
        }
      });

      document.querySelector('[data-refresh]').addEventListener('click', loadApproved);
      document.querySelector('[data-load-pending]').addEventListener('click', () => loadReviewList('PENDING'));
      document.querySelector('[data-load-all]').addEventListener('click', () => loadReviewList('ALL'));

      reviewList.addEventListener('click', async (event) => {
        const approveId = event.target.getAttribute('data-approve');
        const rejectId = event.target.getAttribute('data-reject');
        if (!approveId && !rejectId) {
          return;
        }

        const status = approveId ? 'APPROVED' : 'REJECTED';
        const id = approveId || rejectId;
        try {
          await fetchJson('/api/command-community/review', {
            method: 'POST',
            body: JSON.stringify({ id, status, reviewNote: '' })
          });
          await loadReviewList('PENDING');
          await loadApproved();
        } catch (error) {
          submitStatus.textContent = error.message;
          submitStatus.classList.add('error');
        }
      });

      loadApproved();
      checkDeveloper();
    </script>
  </body>
</html>
