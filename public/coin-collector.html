<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>奶茶实用工具箱 - 贪吃蛇</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'milktea';
        const nextUi = ['normal', 'milktea', 'classic', 'end'].includes(storedUi) ? storedUi : 'milktea';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'milktea';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .game-topbar {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        align-items: center;
      }
      .game-topbar a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.95rem;
        padding: 8px 16px;
        border-radius: 4px;
      }
      .game-topbar a:hover {
        background: rgba(96, 165, 250, 0.1);
      }
      .game-shell {
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background: var(--panel);
        padding: 22px;
      }
      .game-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .game-pill {
        border-radius: 999px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        font-size: 0.9rem;
      }
      .game-stage {
        position: relative;
        display: block;
        margin: 0 auto;
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background: rgba(13, 19, 38, 0.95);
        cursor: default;
      }
      .game-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(8, 14, 28, 0.72);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 8px;
        text-align: center;
        padding: 16px;
      }
      .game-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .game-btn {
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: rgba(96, 165, 250, 0.12);
        color: var(--text);
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .game-btn:hover {
        border-color: var(--accent);
        background: rgba(96, 165, 250, 0.2);
      }
      .game-help {
        text-align: center;
        color: var(--muted);
        margin-top: 14px;
      }
      .dpad {
        display: none;
        grid-template-columns: repeat(3, 44px);
        grid-template-rows: repeat(3, 44px);
        gap: 4px;
        justify-content: center;
        margin-top: 12px;
      }
      @media (max-width: 600px) {
        .dpad { display: grid; }
      }
      .dpad-btn {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: rgba(96, 165, 250, 0.14);
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .dpad-btn:active {
        background: rgba(96, 165, 250, 0.35);
      }
      .dpad-empty {
        width: 44px;
        height: 44px;
      }

      .game-canvas-wrap {
        position: relative;
        width: fit-content;
        margin: 0 auto;
      }

      .game-shell.fs-active {
        position: fixed;
        left: 50%;
        top: 50%;
        width: max-content;
        max-width: none;
        margin: 0;
        z-index: 9999;
        transform: translate(-50%, -50%) scale(var(--game-shell-scale, 1));
        transform-origin: center;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.92);
      }

      .game-overlay.hidden {
        display: none !important;
      }
    </style>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <div class="game-topbar">
        <a href="/niuniu-utility.html">&larr; 返回实用工具箱</a>
        <a href="/settings.html">设置</a>
      </div>

      <section class="game-shell" data-game-shell>
        <h1>贪吃蛇</h1>
        <p class="tool-card-note">控制蛇吃食物，每吃一个 +1 分，蛇会变长。碰到边界或自身即游戏结束。</p>

        <div class="game-head">
          <div class="game-pill" data-game-score>得分：0</div>
          <div class="game-pill" data-game-speed>速度：1</div>
          <div class="game-pill" data-game-best>最高：0</div>
        </div>

        <div class="game-canvas-wrap" data-game-wrap>
          <canvas class="game-stage" data-game-canvas></canvas>
          <div class="game-overlay" data-game-overlay>点击「开始游戏」后使用方向键 / WASD 控制</div>
        </div>

        <div class="game-actions">
          <button type="button" class="game-btn" data-game-start>开始游戏</button>
          <button type="button" class="game-btn" data-game-pause disabled>暂停</button>
          <button type="button" class="game-btn" data-game-reset>重置</button>
        </div>

        <div class="dpad">
          <div class="dpad-empty"></div>
          <button class="dpad-btn" data-dpad="up">&#9650;</button>
          <div class="dpad-empty"></div>
          <button class="dpad-btn" data-dpad="left">&#9664;</button>
          <div class="dpad-empty"></div>
          <button class="dpad-btn" data-dpad="right">&#9654;</button>
          <div class="dpad-empty"></div>
          <button class="dpad-btn" data-dpad="down">&#9660;</button>
          <div class="dpad-empty"></div>
        </div>

        <p class="game-help">操作：W/A/S/D 或 ↑/←/↓/→。吃到食物蛇变长，速度随分数提升。</p>
      </section>
    </main>

    <script>
      (() => {
        const CELL = 20;
        const COLS = 25;
        const ROWS = 20;
        const BASE_INTERVAL = 160;
        const MIN_INTERVAL = 60;

        const gameShell = document.querySelector('[data-game-shell]');
        const canvas = document.querySelector('[data-game-canvas]');
        const ctx = canvas.getContext('2d');
        const scoreText = document.querySelector('[data-game-score]');
        const speedText = document.querySelector('[data-game-speed]');
        const bestText = document.querySelector('[data-game-best]');
        const overlay = document.querySelector('[data-game-overlay]');
        const startButton = document.querySelector('[data-game-start]');
        const pauseButton = document.querySelector('[data-game-pause]');
        const resetButton = document.querySelector('[data-game-reset]');

        function resizeCanvas() {
          var isFs = gameShell.classList.contains('fs-active');
          var scale;
          if (isFs) {
            scale = 1;
          } else {
            var availW = Math.min(window.innerWidth * 0.92, COLS * CELL);
            scale = Math.min(1, availW / (COLS * CELL));
          }
          canvas.width = Math.floor(COLS * CELL * scale);
          canvas.height = Math.floor(ROWS * CELL * scale);
          return scale;
        }

        function updateFullscreenScale() {
          if (!gameShell.classList.contains('fs-active')) {
            gameShell.style.setProperty('--game-shell-scale', '1');
            return;
          }

          var viewportPadding = 32;
          var widthScale = (window.innerWidth - viewportPadding) / gameShell.offsetWidth;
          var heightScale = (window.innerHeight - viewportPadding) / gameShell.offsetHeight;
          var shellScale = Math.max(0.6, Math.min(widthScale, heightScale));
          gameShell.style.setProperty('--game-shell-scale', String(shellScale));
        }

        let drawScale = resizeCanvas();

        const bestScoreKey = 'mctools-snake-best';
        const storedBest = Number.parseInt(localStorage.getItem(bestScoreKey) || '0', 10);
        let bestScore = Number.isFinite(storedBest) ? storedBest : 0;

        let snake = [];
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let gameRunning = false;
        let paused = false;
        let loopTimer = null;

        function getLevel() {
          return Math.floor(score / 5) + 1;
        }

        function getInterval() {
          return Math.max(MIN_INTERVAL, BASE_INTERVAL - (getLevel() - 1) * 15);
        }

        function updateHud() {
          scoreText.textContent = '\u5F97\u5206\uFF1A' + score;
          speedText.textContent = '\u901F\u5EA6\uFF1A' + getLevel();
          bestText.textContent = '\u6700\u9AD8\uFF1A' + bestScore;
        }

        function randomFood() {
          const occupied = new Set(snake.map(s => s.x + ',' + s.y));
          let fx, fy;
          do {
            fx = Math.floor(Math.random() * COLS);
            fy = Math.floor(Math.random() * ROWS);
          } while (occupied.has(fx + ',' + fy));
          food = { x: fx, y: fy };
        }

        function draw() {
          const s = drawScale;
          const w = canvas.width;
          const h = canvas.height;
          const cs = CELL * s;

          ctx.clearRect(0, 0, w, h);

          ctx.strokeStyle = 'rgba(255,255,255,0.035)';
          ctx.lineWidth = 1;
          for (let c = 0; c <= COLS; c++) {
            ctx.beginPath();
            ctx.moveTo(c * cs, 0);
            ctx.lineTo(c * cs, h);
            ctx.stroke();
          }
          for (let r = 0; r <= ROWS; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * cs);
            ctx.lineTo(w, r * cs);
            ctx.stroke();
          }

          const fx = food.x * cs + cs / 2;
          const fy = food.y * cs + cs / 2;
          const fr = cs * 0.38;
          const foodGrad = ctx.createRadialGradient(fx - fr * 0.3, fy - fr * 0.3, fr * 0.1, fx, fy, fr);
          foodGrad.addColorStop(0, '#fde68a');
          foodGrad.addColorStop(1, '#f59e0b');
          ctx.shadowColor = 'rgba(251,191,36,0.7)';
          ctx.shadowBlur = 10;
          ctx.fillStyle = foodGrad;
          ctx.beginPath();
          ctx.arc(fx, fy, fr, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          snake.forEach(function(seg, i) {
            const x = seg.x * cs + 1;
            const y = seg.y * cs + 1;
            const size = cs - 2;
            const radius = size * 0.28;
            if (i === 0) {
              const headGrad = ctx.createLinearGradient(x, y, x + size, y + size);
              headGrad.addColorStop(0, '#93c5fd');
              headGrad.addColorStop(1, '#2563eb');
              ctx.shadowColor = 'rgba(96,165,250,0.6)';
              ctx.shadowBlur = 10;
              ctx.fillStyle = headGrad;
            } else {
              const t = i / snake.length;
              const g = Math.floor(165 - t * 80);
              ctx.shadowColor = 'rgba(37,99,235,0.3)';
              ctx.shadowBlur = 4;
              ctx.fillStyle = 'rgb(37,' + g + ',235)';
            }
            ctx.beginPath();
            ctx.roundRect(x, y, size, size, radius);
            ctx.fill();
          });

          ctx.shadowBlur = 0;
        }

        function initSnake() {
          const midX = Math.floor(COLS / 2);
          const midY = Math.floor(ROWS / 2);
          snake = [
            { x: midX, y: midY },
            { x: midX - 1, y: midY },
            { x: midX - 2, y: midY }
          ];
          dir = { x: 1, y: 0 };
          nextDir = { x: 1, y: 0 };
        }

        function gameOver() {
          gameRunning = false;
          paused = false;
          pauseButton.disabled = true;
          pauseButton.textContent = '\u6682\u505C';
          if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem(bestScoreKey, String(bestScore));
          }
          updateHud();
          showOverlay('\u6E38\u620F\u7ED3\u675F\uFF01\u672C\u5C40\u5F97\u5206\uFF1A<strong>' + score + '</strong>');
          startButton.disabled = false;
        }

        function tick() {
          dir = nextDir;
          const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
          if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { gameOver(); return; }
          if (snake.some(function(s) { return s.x === head.x && s.y === head.y; })) { gameOver(); return; }
          snake.unshift(head);
          if (head.x === food.x && head.y === food.y) {
            score += 1;
            updateHud();
            randomFood();
            restartLoop();
          } else {
            snake.pop();
          }
          draw();
        }

        function restartLoop() {
          if (loopTimer) clearInterval(loopTimer);
          loopTimer = setInterval(tick, getInterval());
        }

        function enterGameFullscreen() {
          gameShell.classList.add('fs-active');
          drawScale = resizeCanvas();
          draw();
          updateFullscreenScale();
        }

        function exitGameFullscreen() {
          gameShell.classList.remove('fs-active');
          drawScale = resizeCanvas();
          draw();
          updateFullscreenScale();
        }

        function pauseGame() {
          if (!gameRunning || paused) return;
          paused = true;
          if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
          pauseButton.textContent = '\u7EE7\u7EED';
          showOverlay('\u6E38\u620F\u5DF2\u6682\u505C<br><span style="font-size:0.85rem;opacity:0.75;margin-top:6px;display:block">\u6309 Esc \u6216\u70B9\u51FB\u300C\u7EE7\u7EED\u300D\u6062\u590D</span>');
          exitGameFullscreen();
        }

        function resumeGame() {
          if (!gameRunning || !paused) return;
          paused = false;
          pauseButton.textContent = '\u6682\u505C';
          hideOverlay();
          restartLoop();
        }

        function hideOverlay() {
          overlay.hidden = true;
          overlay.classList.add('hidden');
        }

        function showOverlay(html) {
          overlay.innerHTML = html;
          overlay.hidden = false;
          overlay.classList.remove('hidden');
        }

        function startGame() {
          score = 0;
          gameRunning = true;
          paused = false;
          startButton.disabled = true;
          pauseButton.disabled = false;
          pauseButton.textContent = '\u6682\u505C';
          hideOverlay();
          enterGameFullscreen();
          drawScale = resizeCanvas();
          initSnake();
          randomFood();
          updateHud();
          draw();
          restartLoop();
        }

        function resetGame() {
          gameRunning = false;
          paused = false;
          pauseButton.disabled = true;
          pauseButton.textContent = '\u6682\u505C';
          if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
          score = 0;
          drawScale = resizeCanvas();
          initSnake();
          randomFood();
          updateHud();
          draw();
          showOverlay('\u70B9\u51FB\u300C\u5F00\u59CB\u6E38\u620F\u300D\u540E\u4F7F\u7528\u65B9\u5411\u952E / WASD \u63A7\u5236');
          startButton.disabled = false;
        }

        function setDir(dx, dy) {
          if (dx !== 0 && dir.x !== 0) return;
          if (dy !== 0 && dir.y !== 0) return;
          nextDir = { x: dx, y: dy };
        }

        document.addEventListener('keydown', function(e) {
          const key = e.key.toLowerCase();
          if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(key)) e.preventDefault();
          if (e.key === 'Escape' && gameRunning) {
            paused ? resumeGame() : pauseGame();
            return;
          }
          if (!gameRunning || paused) return;
          if (key === 'arrowup' || key === 'w') setDir(0, -1);
          if (key === 'arrowdown' || key === 's') setDir(0, 1);
          if (key === 'arrowleft' || key === 'a') setDir(-1, 0);
          if (key === 'arrowright' || key === 'd') setDir(1, 0);
        });

        pauseButton.addEventListener('click', function() {
          if (!gameRunning) return;
          paused ? resumeGame() : pauseGame();
        });

        document.querySelectorAll('[data-dpad]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            if (!gameRunning || paused) return;
            const d = btn.dataset.dpad;
            if (d === 'up') setDir(0, -1);
            if (d === 'down') setDir(0, 1);
            if (d === 'left') setDir(-1, 0);
            if (d === 'right') setDir(1, 0);
          });
        });

        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', function(e) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }, { passive: true });
        canvas.addEventListener('touchend', function(e) {
          if (!gameRunning) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          const dy = e.changedTouches[0].clientY - touchStartY;
          if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
          if (Math.abs(dx) > Math.abs(dy)) { setDir(dx > 0 ? 1 : -1, 0); }
          else { setDir(0, dy > 0 ? 1 : -1); }
        }, { passive: true });

        startButton.addEventListener('click', startGame);
        resetButton.addEventListener('click', resetGame);

        window.addEventListener('resize', function() {
          drawScale = resizeCanvas();
          draw();
          updateFullscreenScale();
        });

        drawScale = resizeCanvas();
        initSnake();
        randomFood();
        updateHud();
        draw();
      })();
    </script>
  </body>
</html>
