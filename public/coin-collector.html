<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>濂惰尪瀹炵敤宸ュ叿绠?- 璐悆铔?/title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'milktea';
        const nextUi = ['normal', 'milktea', 'classic', 'end', 'liquid'].includes(storedUi) ? storedUi : 'milktea';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'milktea';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .game-topbar {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        align-items: center;
      }

      .game-topbar a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.95rem;
        padding: 8px 16px;
        border-radius: 4px;
      }

      .game-topbar a:hover {
        background: rgba(96, 165, 250, 0.1);
      }

      .game-shell {
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background: var(--panel);
        padding: 22px;
      }

      .game-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .game-pill {
        border-radius: 999px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        font-size: 0.9rem;
      }

      .game-stage {
        position: relative;
        display: block;
        margin: 0 auto;
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background: rgba(13, 19, 38, 0.95);
        cursor: default;
      }

      .game-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(8, 14, 28, 0.72);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 8px;
        text-align: center;
        padding: 16px;
      }

      .game-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .game-btn {
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: rgba(96, 165, 250, 0.12);
        color: var(--text);
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .game-btn:hover {
        border-color: var(--accent);
        background: rgba(96, 165, 250, 0.2);
      }

      .game-help {
        text-align: center;
        color: var(--muted);
        margin-top: 14px;
      }
