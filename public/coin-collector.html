<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>奶茶实用工具箱 - 吃金币</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'milktea';
        const nextUi = ['normal', 'milktea', 'classic', 'end', 'liquid'].includes(storedUi) ? storedUi : 'milktea';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'milktea';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .game-topbar {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        align-items: center;
      }

      .game-topbar a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.95rem;
        padding: 8px 16px;
        border-radius: 4px;
      }

      .game-topbar a:hover {
        background: rgba(96, 165, 250, 0.1);
      }

      .game-shell {
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background: var(--panel);
        padding: 22px;
      }

      .game-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .game-pill {
        border-radius: 999px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        font-size: 0.9rem;
      }

      .game-stage {
        position: relative;
        width: min(680px, 92vw);
        height: min(420px, 64vw);
        min-height: 320px;
        margin: 0 auto;
        border-radius: 10px;
        border: 2px solid var(--panel-border);
        background:
          radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.18), transparent 38%),
          radial-gradient(circle at 80% 80%, rgba(251, 191, 36, 0.12), transparent 40%),
          rgba(13, 19, 38, 0.88);
        overflow: hidden;
      }

      .player {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(145deg, #60a5fa, #2563eb);
        box-shadow: 0 0 12px rgba(96, 165, 250, 0.55);
      }

      .coin {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fde68a, #f59e0b 70%);
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.65);
      }

      .game-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .game-btn {
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        background: rgba(96, 165, 250, 0.12);
        color: var(--text);
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .game-btn:hover {
        border-color: var(--accent);
        background: rgba(96, 165, 250, 0.2);
      }

      .game-help {
        text-align: center;
        color: var(--muted);
        margin-top: 14px;
      }

      .game-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(8, 14, 28, 0.62);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 600;
      }
    </style>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <div class="game-topbar">
        <a href="/niuniu-utility.html">← 返回实用工具箱</a>
        <a href="/settings.html">设置</a>
      </div>

      <section class="game-shell">
        <h1>吃金币</h1>
        <p class="tool-card-note">移动角色捡金币得分。每捡到一个金币 +1 分，游戏时长 60 秒。</p>

        <div class="game-head">
          <div class="game-pill" data-game-score>得分：0</div>
          <div class="game-pill" data-game-time>剩余：60 秒</div>
          <div class="game-pill" data-game-best>最高：0</div>
        </div>

        <div class="game-stage" data-game-stage>
          <div class="player" data-game-player></div>
          <div class="coin" data-game-coin></div>
          <div class="game-overlay" data-game-overlay>点击“开始游戏”后使用方向键/WASD移动</div>
        </div>

        <div class="game-actions">
          <button type="button" class="game-btn" data-game-start>开始游戏</button>
          <button type="button" class="game-btn" data-game-reset>重置</button>
        </div>

        <p class="game-help">操作：W/A/S/D 或 ↑/←/↓/→。移动碰到金币即可加分。</p>
      </section>
    </main>

    <script>
      (() => {
        const stage = document.querySelector('[data-game-stage]');
        const player = document.querySelector('[data-game-player]');
        const coin = document.querySelector('[data-game-coin]');
        const scoreText = document.querySelector('[data-game-score]');
        const timeText = document.querySelector('[data-game-time]');
        const bestText = document.querySelector('[data-game-best]');
        const overlay = document.querySelector('[data-game-overlay]');
        const startButton = document.querySelector('[data-game-start]');
        const resetButton = document.querySelector('[data-game-reset]');

        const moveStep = 12;
        const gameDuration = 60;
        const playerSize = 30;
        const coinSize = 22;

        let gameRunning = false;
        let score = 0;
        let timeLeft = gameDuration;
        let countdownTimer = null;
        let playerPos = { x: 20, y: 20 };
        let coinPos = { x: 120, y: 120 };

        const bestScoreKey = 'mctools-coin-collector-best';
        const storedBest = Number.parseInt(localStorage.getItem(bestScoreKey) || '0', 10);
        let bestScore = Number.isFinite(storedBest) ? storedBest : 0;

        function updateHud() {
          scoreText.textContent = `得分：${score}`;
          timeText.textContent = `剩余：${timeLeft} 秒`;
          bestText.textContent = `最高：${bestScore}`;
        }

        function clampPosition(value, max) {
          return Math.max(0, Math.min(value, max));
        }

        function stageBounds() {
          return {
            width: stage.clientWidth,
            height: stage.clientHeight
          };
        }

        function renderPlayer() {
          player.style.left = `${playerPos.x}px`;
          player.style.top = `${playerPos.y}px`;
        }

        function renderCoin() {
          coin.style.left = `${coinPos.x}px`;
          coin.style.top = `${coinPos.y}px`;
        }

        function randomCoinPosition() {
          const bounds = stageBounds();
          coinPos.x = Math.floor(Math.random() * (bounds.width - coinSize));
          coinPos.y = Math.floor(Math.random() * (bounds.height - coinSize));
          renderCoin();
        }

        function isColliding() {
          return (
            playerPos.x < coinPos.x + coinSize &&
            playerPos.x + playerSize > coinPos.x &&
            playerPos.y < coinPos.y + coinSize &&
            playerPos.y + playerSize > coinPos.y
          );
        }

        function saveBestScore() {
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem(bestScoreKey, String(bestScore));
          }
        }

        function stopGame(message) {
          gameRunning = false;
          if (countdownTimer) {
            window.clearInterval(countdownTimer);
            countdownTimer = null;
          }
          saveBestScore();
          updateHud();
          overlay.hidden = false;
          overlay.textContent = `${message} 本局得分：${score}，点击“开始游戏”再来一局`;
          startButton.disabled = false;
        }

        function startGame() {
          score = 0;
          timeLeft = gameDuration;
          gameRunning = true;
          startButton.disabled = true;
          overlay.hidden = true;

          const bounds = stageBounds();
          playerPos.x = Math.floor((bounds.width - playerSize) / 2);
          playerPos.y = Math.floor((bounds.height - playerSize) / 2);
          renderPlayer();
          randomCoinPosition();
          updateHud();

          if (countdownTimer) {
            window.clearInterval(countdownTimer);
          }
          countdownTimer = window.setInterval(() => {
            timeLeft -= 1;
            updateHud();
            if (timeLeft <= 0) {
              stopGame('时间到，游戏结束！');
            }
          }, 1000);
        }

        function resetGame() {
          if (countdownTimer) {
            window.clearInterval(countdownTimer);
            countdownTimer = null;
          }
          gameRunning = false;
          score = 0;
          timeLeft = gameDuration;
          playerPos = { x: 20, y: 20 };
          coinPos = { x: 120, y: 120 };
          renderPlayer();
          renderCoin();
          updateHud();
          overlay.hidden = false;
          overlay.textContent = '点击“开始游戏”后使用方向键/WASD移动';
          startButton.disabled = false;
        }

        function movePlayer(dx, dy) {
          if (!gameRunning) {
            return;
          }

          const bounds = stageBounds();
          playerPos.x = clampPosition(playerPos.x + dx, bounds.width - playerSize);
          playerPos.y = clampPosition(playerPos.y + dy, bounds.height - playerSize);
          renderPlayer();

          if (isColliding()) {
            score += 1;
            updateHud();
            randomCoinPosition();
          }
        }

        document.addEventListener('keydown', (event) => {
          if (!gameRunning) {
            return;
          }

          const key = event.key.toLowerCase();

          if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(key)) {
            event.preventDefault();
          }

          if (key === 'arrowup' || key === 'w') movePlayer(0, -moveStep);
          if (key === 'arrowdown' || key === 's') movePlayer(0, moveStep);
          if (key === 'arrowleft' || key === 'a') movePlayer(-moveStep, 0);
          if (key === 'arrowright' || key === 'd') movePlayer(moveStep, 0);
        });

        startButton.addEventListener('click', startGame);
        resetButton.addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
          const bounds = stageBounds();
          playerPos.x = clampPosition(playerPos.x, bounds.width - playerSize);
          playerPos.y = clampPosition(playerPos.y, bounds.height - playerSize);
          coinPos.x = clampPosition(coinPos.x, bounds.width - coinSize);
          coinPos.y = clampPosition(coinPos.y, bounds.height - coinSize);
          renderPlayer();
          renderCoin();
        });

        renderPlayer();
        renderCoin();
        updateHud();
      })();
    </script>
  </body>
</html>
