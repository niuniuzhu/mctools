<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界工具箱 - 材质包与光影中心</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'normal';
        const nextUi = storedUi === 'normal' || storedUi === 'classic' || storedUi === 'end' ? storedUi : 'normal';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'normal';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
    <script defer src="/pack-center.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero"><div class="hero-copy"><p class="badge">Minecraft Toolbox</p><h1>材质包与光影中心</h1><p class="lead">按设备和风格给你推荐资源包、光影方向和搭配思路，适合想换视觉风格的时候。</p><div class="meta-row"><div class="version-pill">当前版本 beta1.6.0</div><div class="version-pill">模块：材质包与光影中心</div></div><div class="workspace-nav"><a class="ghost-link-button" href="/index.html">返回选择界面</a></div></div><div class="hero-card"><p class="hero-card-label">当前模块：材质与光影</p><p class="toolbox-summary">内置风格推荐、设备档位建议和搭配方向。</p><div class="profile-card profile-card-inline"><div class="avatar-wrap"><img class="avatar-image" data-avatar-image alt="账号头像" src="" /><div class="avatar-fallback" data-avatar-fallback>头</div></div><div class="profile-meta"><p class="panel-label">账号信息</p><strong data-profile-name>未登录</strong><div class="account-pill profile-pill" data-account-pill>当前账号：未加载</div><div class="profile-actions"><button type="button" class="upload-button" data-avatar-trigger>上传头像</button><input type="file" accept="image/png,image/jpeg,image/webp" data-avatar-input hidden /><button type="button" class="ghost-button compact-button" data-avatar-delete>删除头像</button><button type="button" class="ghost-button compact-button" data-logout>退出登录</button></div><p class="avatar-status" data-avatar-status hidden></p></div></div><p class="member-state" data-member-state>会员等级：普通用户</p><p class="vip-state" data-vip-state>VIP 状态：未开通</p></div></section>
      <section class="content-panel"><div class="panel-head"><div><p class="panel-label">工具箱 · 视觉</p><h2>资源包与光影建议</h2></div><p class="tool-card-note">这里只做方向推荐，不提供下载。</p></div><div class="utility-grid"><article class="guide-card utility-card"><p class="panel-label">功能 1</p><h2>风格方向</h2><button type="button" class="copy-btn" data-pack-style>抽风格</button><div class="result-card" data-pack-style-result>风格会显示在这里。</div></article><article class="guide-card utility-card"><p class="panel-label">功能 2</p><h2>设备档位</h2><button type="button" class="copy-btn" data-pack-spec>抽配置建议</button><div class="result-card" data-pack-spec-result>配置建议会显示在这里。</div></article><article class="guide-card utility-card utility-card-wide"><p class="panel-label">功能 3</p><h2>一套视觉方案</h2><button type="button" class="copy-btn" data-pack-plan>生成方案</button><div class="result-card" data-pack-plan-result>方案会显示在这里。</div></article></div></section>
    </main>
  </body>
</html>
