<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界工具箱 - 模组推荐库</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'milktea';
        const nextUi = storedUi === 'normal' || storedUi === 'classic' || storedUi === 'end' || storedUi === 'liquid' ? storedUi : 'normal';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'normal';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
    <script defer src="/mods.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero"><div class="hero-copy"><p class="badge">Minecraft Toolbox</p><h1>模组推荐库</h1><p class="lead">按玩法方向给你推荐模组路线，适合整合包前期选型和联机服务器模组方向规划。</p><div class="meta-row"><div class="version-pill">当前版本 v1.2.0 正式版</div><div class="version-pill">模块：模组推荐库</div></div><div class="workspace-nav"><a class="ghost-link-button" href="/index.html">返回选择界面</a></div></div><div class="hero-card"><p class="hero-card-label">当前模块：模组</p><p class="toolbox-summary">内置科技、冒险、建筑、性能和联机友好型模组方向推荐。</p><div class="profile-card profile-card-inline"><div class="avatar-wrap"><img class="avatar-image" data-avatar-image alt="账号头像" src="" /><div class="avatar-fallback" data-avatar-fallback>头</div></div><div class="profile-meta"><p class="panel-label">账号信息</p><strong data-profile-name>未登录</strong><div class="account-pill profile-pill" data-account-pill>当前账号：未加载</div><div class="profile-actions"><button type="button" class="upload-button" data-avatar-trigger>上传头像</button><input type="file" accept="image/png,image/jpeg,image/webp" data-avatar-input hidden /><button type="button" class="ghost-button compact-button" data-avatar-delete>删除头像</button><button type="button" class="ghost-button compact-button" data-logout>退出登录</button></div><p class="avatar-status" data-avatar-status hidden></p></div></div><p class="member-state" data-member-state>会员等级：普通用户</p><p class="vip-state" data-vip-state>VIP 状态：未开通</p></div></section>
      <section class="content-panel"><div class="panel-head"><div><p class="panel-label">工具箱 · 模组</p><h2>模组路线推荐</h2></div><p class="tool-card-note">做方向推荐，不绑定具体下载源。</p></div><div class="utility-grid"><article class="guide-card utility-card"><p class="panel-label">功能 1</p><h2>玩法方向</h2><button type="button" class="copy-btn" data-mod-theme>抽模组方向</button><div class="result-card" data-mod-theme-result>方向会显示在这里。</div></article><article class="guide-card utility-card"><p class="panel-label">功能 2</p><h2>性能组合</h2><button type="button" class="copy-btn" data-mod-performance>抽性能组合</button><div class="result-card" data-mod-performance-result>组合会显示在这里。</div></article><article class="guide-card utility-card utility-card-wide"><p class="panel-label">功能 3</p><h2>整合包思路</h2><button type="button" class="copy-btn" data-mod-pack>生成整合包思路</button><div class="result-card" data-mod-pack-result>思路会显示在这里。</div></article></div></section>
    </main>
  </body>
</html>
