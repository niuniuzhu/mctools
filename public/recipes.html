<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界工具箱 - 查看配方</title>
    <script>
      try {
        const storedUi = localStorage.getItem('mctools-ui') || 'normal';
        const nextUi = storedUi === 'normal' || storedUi === 'classic' || storedUi === 'end' || storedUi === 'liquid' ? storedUi : 'normal';
        localStorage.setItem('mctools-ui', nextUi);
        document.documentElement.dataset.ui = nextUi;
      } catch {
        document.documentElement.dataset.ui = 'normal';
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
    <script defer src="/recipes.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="badge">Minecraft Toolbox</p>
          <h1>查看配方</h1>
          <p class="lead">这里先开放常用生存配方速查，后续可以继续扩展到完整的工作台、熔炉和酿造体系。</p>
          <div class="meta-row">
            <div class="version-pill">当前版本 beta1.9.0</div>
            <div class="version-pill">模块：查看配方</div>
          </div>
          <div class="workspace-nav">
            <a class="ghost-link-button" href="/index.html">返回选择界面</a>
          </div>
        </div>
        <div class="hero-card">
          <p class="hero-card-label">当前模块：配方</p>
          <p class="toolbox-summary">先收录高频生存配方，方便快速查看核心材料和用途。</p>
          <div class="profile-card profile-card-inline">
            <div class="avatar-wrap">
              <img class="avatar-image" data-avatar-image alt="账号头像" src="" />
              <div class="avatar-fallback" data-avatar-fallback>头</div>
            </div>
            <div class="profile-meta">
              <p class="panel-label">账号信息</p>
              <strong data-profile-name>未登录</strong>
              <div class="account-pill profile-pill" data-account-pill>当前账号：未加载</div>
              <div class="profile-actions">
                <button type="button" class="upload-button" data-avatar-trigger>上传头像</button>
                <input type="file" accept="image/png,image/jpeg,image/webp" data-avatar-input hidden />
                <button type="button" class="ghost-button compact-button" data-avatar-delete>删除头像</button>
                <button type="button" class="ghost-button compact-button" data-logout>退出登录</button>
              </div>
              <p class="avatar-status" data-avatar-status hidden></p>
            </div>
          </div>
          <p class="member-state" data-member-state>会员等级：普通用户</p>
          <p class="vip-state" data-vip-state>VIP 状态：未开通</p>
          <button type="button" class="ghost-button" data-vip-purchase>购买 VIP 10 元</button>
          <button type="button" class="ghost-button" data-svip-purchase>购买 SVIP 25 元</button>
        </div>
      </section>

      <section class="content-panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">工具箱 · 配方库</p>
            <h2>配方搜索数据库</h2>
          </div>
          <p class="tool-card-note">支持按名称、分类、材料反查常见生存配方。</p>
        </div>
        <div class="recipe-toolbar">
          <input type="text" data-recipe-search placeholder="搜索配方名称，例如 盾牌 / 漏斗 / 酿造台" />
          <select data-recipe-category>
            <option value="all">全部分类</option>
            <option value="基础">基础</option>
            <option value="装备">装备</option>
            <option value="生存">生存</option>
            <option value="功能">功能</option>
            <option value="下界">下界</option>
            <option value="红石">红石</option>
            <option value="储存">储存</option>
          </select>
          <input type="text" data-recipe-material placeholder="按材料反查，例如 铁锭 / 木板 / 红石" />
        </div>
        <p class="tool-card-note" data-recipe-summary>正在加载配方库...</p>
        <div class="recipe-grid" data-recipe-results>
          <p class="empty-state">正在加载配方库...</p>
        </div>
      </section>
    </main>
  </body>
</html>
