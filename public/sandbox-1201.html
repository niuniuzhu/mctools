<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的世界工具箱 - 自研沙盒 1.20.1 风格</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1220;
        --panel: rgba(9, 15, 30, 0.82);
        --line: rgba(148, 163, 184, 0.25);
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-soft: rgba(34, 211, 238, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
        background:
          radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.2), transparent 42%),
          radial-gradient(circle at 85% 80%, rgba(167, 139, 250, 0.18), transparent 35%),
          var(--bg);
        color: var(--text);
      }

      .sandbox-layout {
        width: min(1200px, 96vw);
        margin: 18px auto;
        display: grid;
        grid-template-columns: minmax(280px, 340px) 1fr;
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        backdrop-filter: blur(8px);
      }

      .sidebar {
        padding: 14px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .badge {
        margin: 0;
        color: #67e8f9;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
      }

      h1 {
        margin: 2px 0 8px;
        font-size: 1.45rem;
      }

      .muted {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 0.95rem;
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        border: 1px solid var(--line);
        background: rgba(30, 41, 59, 0.72);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        font-size: 0.92rem;
      }

      .btn:hover {
        border-color: var(--accent);
        background: rgba(34, 211, 238, 0.13);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 9px;
        background: rgba(15, 23, 42, 0.72);
      }

      .stat p {
        margin: 0;
      }

      .stat .k {
        font-size: 11px;
        color: var(--muted);
      }

      .stat .v {
        margin-top: 3px;
        font-size: 0.95rem;
      }

      .canvas-wrap {
        padding: 10px;
        position: relative;
      }

      #sandboxCanvas {
        width: 100%;
        height: min(78vh, 760px);
        display: block;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #0b1325;
      }

      .crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 14px;
        height: 14px;
        pointer-events: none;
      }

      .crosshair::before,
      .crosshair::after {
        content: "";
        position: absolute;
        background: rgba(229, 231, 235, 0.85);
      }

      .crosshair::before {
        width: 14px;
        height: 2px;
        top: 6px;
      }

      .crosshair::after {
        width: 2px;
        height: 14px;
        left: 6px;
      }

      .hotbar {
        position: absolute;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.76);
      }

      .slot {
        width: 62px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 8px;
        padding: 6px;
        text-align: center;
        font-size: 12px;
        color: #cbd5e1;
        cursor: pointer;
      }

      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-soft);
      }

      .swatch {
        width: 100%;
        height: 24px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 4px;
      }

      @media (max-width: 980px) {
        .sandbox-layout {
          grid-template-columns: 1fr;
        }

        #sandboxCanvas {
          height: 60vh;
        }

        .slot {
          width: 52px;
          padding: 5px;
        }
      }
    </style>
    <script defer src="/sandbox-1201.js"></script>
  </head>
  <body>
    <main class="sandbox-layout">
      <aside class="panel sidebar">
        <p class="badge">Self-built Sandbox</p>
        <h1>1.20.1 风格沙盒实验版</h1>
        <p class="muted">这是自研类 Minecraft 页面，不使用官方资源。支持移动、挖掘、放置、快捷栏和本地自动存档。</p>
        <div class="btn-row">
          <a class="btn" href="/launch-game.html">返回启动中心</a>
          <button class="btn" type="button" data-action="reset-world">重置世界</button>
          <button class="btn" type="button" data-action="save-world">立即保存</button>
        </div>
        <div class="stats">
          <div class="stat">
            <p class="k">玩家坐标</p>
            <p class="v" data-stat-pos>X:0 Y:0</p>
          </div>
          <div class="stat">
            <p class="k">地形种子</p>
            <p class="v" data-stat-seed>--</p>
          </div>
          <div class="stat">
            <p class="k">当前方块</p>
            <p class="v" data-stat-block>草方块</p>
          </div>
          <div class="stat">
            <p class="k">昼夜时间</p>
            <p class="v" data-stat-time>06:00</p>
          </div>
        </div>
        <p class="muted">操作：WASD 移动，Shift 冲刺，鼠标左键挖掘，右键放置，滚轮或数字键 1-6 切换方块。</p>
      </aside>

      <section class="panel canvas-wrap">
        <canvas id="sandboxCanvas" width="1280" height="720" aria-label="自研沙盒画布"></canvas>
        <div class="crosshair" aria-hidden="true"></div>
        <div class="hotbar" data-hotbar></div>
      </section>
    </main>
  </body>
</html>
